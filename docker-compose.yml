services:
  postgres:
    image: postgres:15-alpine
    container_name: forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: forge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d forge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Orchestrator API (built from the local Dockerfile).
  # On an Oracle ARM VM this builds natively for linux/arm64.
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: forge-orchestrator:latest
    container_name: forge-orchestrator
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # App is currently in-memory; DATABASE_URL is here for when the
      # Postgres-backed store is wired in (Week 2+).
      DATABASE_URL: postgres://postgres:secret@postgres:5432/forge?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # Caddy (HTTPS reverse proxy for DuckDNS)
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DUCKDNS_DOMAIN: 4orge.duckdns.org
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata: